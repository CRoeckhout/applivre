<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grimolia — admin badges</title>
    <!-- Polices user (cf. lib/theme/fonts.ts côté mobile). Chargées en
         display=swap : la card user-rich-card.tsx les applique via fontId
         pour matcher l'apparence de l'app. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=UnifrakturMaguntia&family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    />
  </head>
  <body>
    <!--
      Expose `global` au runtime avant que tout JS module se charge.
      RN-Web / @shopify/react-native-skia (et indirectement react-native-
      reanimated) référencent le global Node.js `global` qui n'existe pas
      dans le browser. Le `define: { global: 'globalThis' }` de Vite ne
      couvre pas tous les patterns (IIFE, typeof checks). Définir
      `window.global = window` ici garantit que `global` existe au tout
      premier accès.
    -->
    <script>
      window.global = window;
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
